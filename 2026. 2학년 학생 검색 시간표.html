<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>2026. 2학년 학생 검색 시간표</title>
<style>
  :root {
    --bg: #f4f7fb;
    --panel: #ffffff;
    --line: #d6deea;
    --line-strong: #b8c6d9;
    --text: #17324d;
    --muted: #62758a;
    --brand: #2d5b8f;
    --brand-soft: #eaf2fb;
    --accent: #f7fafc;
    --hover: #f1f6fd;
    --shadow: 0 10px 28px rgba(19, 44, 74, 0.08);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Pretendard", "Noto Sans KR", "Malgun Gothic", Arial, sans-serif;
    color: var(--text);
    background: linear-gradient(180deg, #edf3fa 0%, #f7f9fc 100%);
  }
  .wrap {
    max-width: 1400px;
    margin: 0 auto;
    padding: 28px 20px 40px;
  }
  .hero {
    background: linear-gradient(135deg, #2c5686 0%, #3d6fa8 100%);
    color: white;
    border-radius: 24px;
    padding: 28px 28px 22px;
    box-shadow: var(--shadow);
    margin-bottom: 18px;
  }
  .hero h1 {
    margin: 0 0 8px;
    font-size: 30px;
    letter-spacing: -0.02em;
  }
  .hero p {
    margin: 0;
    font-size: 15px;
    color: rgba(255,255,255,0.9);
  }
  .toolbar {
    display: grid;
    grid-template-columns: 1.2fr 180px 120px;
    gap: 12px;
    margin-top: 18px;
  }
  .input, .select, .button {
    width: 100%;
    height: 50px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.28);
    outline: none;
    font-size: 15px;
  }
  .input, .select {
    padding: 0 16px;
    background: rgba(255,255,255,0.96);
    color: var(--text);
  }
  .button {
    background: #0f2742;
    color: #fff;
    font-weight: 700;
    cursor: pointer;
  }
  .button:hover { filter: brightness(1.05); }
  .meta {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
    margin: 18px 0;
  }
  .meta-card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 16px 18px;
    box-shadow: var(--shadow);
  }
  .meta-card .label {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .meta-card .value {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  .layout {
    display: grid;
    grid-template-columns: 360px 1fr;
    gap: 18px;
    align-items: start;
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 22px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .panel-head {
    padding: 18px 20px 12px;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, #fbfdff 0%, #f5f8fc 100%);
  }
  .panel-title {
    font-size: 18px;
    font-weight: 800;
    margin: 0 0 6px;
  }
  .panel-sub {
    font-size: 13px;
    color: var(--muted);
    margin: 0;
    line-height: 1.5;
  }
  .candidate-list {
    max-height: 760px;
    overflow: auto;
    padding: 10px;
  }
  .candidate {
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 14px 14px;
    background: #fff;
    margin-bottom: 10px;
    cursor: pointer;
    transition: 0.15s ease;
  }
  .candidate:hover {
    background: var(--hover);
    border-color: #9eb6d4;
    transform: translateY(-1px);
  }
  .candidate.active {
    background: var(--brand-soft);
    border-color: #85a9d3;
  }
  .candidate-top {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    align-items: center;
    margin-bottom: 6px;
  }
  .candidate-name {
    font-weight: 800;
    font-size: 17px;
  }
  .candidate-badge {
    background: #edf3fb;
    color: var(--brand);
    font-size: 12px;
    font-weight: 800;
    padding: 6px 9px;
    border-radius: 999px;
    border: 1px solid #c7d9ef;
    white-space: nowrap;
  }
  .candidate-meta {
    font-size: 13px;
    color: var(--muted);
  }
  .summary {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    padding: 16px 20px 6px;
  }
  .summary-chip {
    background: #f5f8fc;
    border: 1px solid var(--line);
    color: var(--muted);
    padding: 8px 12px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 700;
  }
  .empty {
    padding: 34px 20px 40px;
    text-align: center;
    color: var(--muted);
    line-height: 1.7;
  }
  .student-head {
    padding: 20px 22px 8px;
  }
  .student-title {
    margin: 0 0 10px;
    font-size: 28px;
    font-weight: 900;
    letter-spacing: -0.03em;
  }
  .student-sub {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  .student-sub span {
    background: #f4f7fb;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 7px 12px;
    color: var(--muted);
    font-size: 13px;
    font-weight: 700;
  }
  .table-wrap {
    padding: 14px 18px 20px;
  }
  table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    overflow: hidden;
    border: 1px solid var(--line);
    border-radius: 18px;
  }
  thead th {
    background: #e9eff7;
    color: #15324f;
    font-size: 15px;
    font-weight: 800;
    padding: 14px 10px;
    border-right: 1px solid var(--line);
    text-align: center;
  }
  thead th:last-child { border-right: 0; }
  tbody td {
    background: #fff;
    border-top: 1px solid var(--line);
    border-right: 1px solid var(--line);
    vertical-align: middle;
    text-align: center;
    padding: 14px 10px;
    min-width: 120px;
  }
  tbody tr td:last-child { border-right: 0; }
  tbody td.period {
    width: 88px;
    background: #f7f9fc;
    font-weight: 800;
    font-size: 18px;
  }
  .subject {
    font-size: 18px;
    font-weight: 900;
    letter-spacing: -0.02em;
    color: #0f2b47;
    margin-bottom: 8px;
    word-break: keep-all;
  }
  .detail {
    font-size: 14px;
    color: #61758a;
    line-height: 1.35;
    word-break: keep-all;
  }
  .blank {
    color: #a0afbf;
    font-weight: 700;
  }
  .guide {
    padding: 0 20px 18px;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.7;
  }
  @media (max-width: 1100px) {
    .layout {
      grid-template-columns: 1fr;
    }
    .candidate-list {
      max-height: none;
    }
  }
  @media (max-width: 760px) {
    .toolbar {
      grid-template-columns: 1fr;
    }
    .meta {
      grid-template-columns: 1fr 1fr;
    }
    .student-title {
      font-size: 24px;
    }
    .subject {
      font-size: 16px;
    }
    .detail {
      font-size: 13px;
    }
    .table-wrap {
      overflow-x: auto;
    }
    table {
      min-width: 820px;
    }
  }

.detail-only-panel { padding-top: 18px; }
#detailPanel { margin-top: 0; }
.candidate-meta { display:none; }
.student-head { margin-top: 0; }
.student-sub:empty { display:none; }
</style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>2026. 2학년 학생 검색 시간표</h1>
      <p>이름 일부, 초성, 반/번호로 검색할 수 있습니다. 여러 명이 검색되면 왼쪽 목록에서 선택해 주세요.</p>
      <div class="toolbar">
        <input id="searchInput" class="input" type="text" placeholder="예: 권민주 / ㄱㅁㅈ / 권 / 민주 / 2번 / 3반 2번" />
        <select id="classFilter" class="select">
          <option value="all">전체 반</option>
          <option value="1">1반</option>
          <option value="2">2반</option>
          <option value="3">3반</option>
          <option value="4">4반</option>
          <option value="5">5반</option>
          <option value="6">6반</option>
          <option value="7">7반</option>
          <option value="8">8반</option>
        </select>
        <button id="searchBtn" class="button" type="button">검색</button>
      </div>
    </section>

    <section class="meta">
      <div class="meta-card">
        <div class="label">전체 학생 수</div>
        <div class="value" id="studentCount">-</div>
      </div>
      <div class="meta-card">
        <div class="label">현재 반 필터</div>
        <div class="value" id="classCountLabel">전체 반</div>
      </div>
      <div class="meta-card">
        <div class="label">검색 결과 수</div>
        <div class="value" id="resultCount">-</div>
      </div>
      <div class="meta-card">
        <div class="label">현재 선택 학생</div>
        <div class="value" id="selectedName">없음</div>
      </div>
    </section>

    <section class="layout">
      <div class="panel">
        <div class="panel-head">
          <h2 class="panel-title">학생 목록</h2>
          <p class="panel-sub">검색 결과가 여러 명이면 아래에서 원하는 학생을<br>눌러 시간표를 확인하세요.</p>
        </div>
        <div class="summary">
          <div class="summary-chip" id="searchSummary">검색어: 전체</div>
          <div class="summary-chip" id="filterSummary">반 필터: 전체 반</div>
        </div>
        <div id="candidateList" class="candidate-list"></div>
      </div>

      <div class="panel detail-only-panel">
        <div id="detailPanel"></div>
      </div>
    </section>
  </div>

const days = ["월요일", "화요일", "수요일", "목요일", "금요일"];
let filteredStudents = [];
let selectedKey = "";

function normalize(value) {
  return String(value || "").replace(/\s+/g, "").toLowerCase();
}

function getChosung(text) {
  const CHO = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
  return Array.from(String(text || "")).map(ch => {
    const code = ch.charCodeAt(0);
    if (code >= 0xac00 && code <= 0xd7a3) {
      return CHO[Math.floor((code - 0xac00) / 588)];
    }
    return ch;
  }).join("");
}

function studentKey(student) {
  return `${student.class}-${student.number}-${student.name}`;
}

function parseQuery(query) {
  const q = normalize(query);
  const classMatch = q.match(/(\d+)반/);
  const numberMatch = q.match(/(\d+)번/);
  const pureNumber = q.match(/^\d+$/);
  return {
    q,
    classNum: classMatch ? Number(classMatch[1]) : null,
    numberNum: numberMatch ? Number(numberMatch[1]) : (pureNumber ? Number(pureNumber[0]) : null),
    hasNumberWord: /번/.test(q) || /^\d+$/.test(q),
    chosung: getChosung(q)
  };
}

function computeScore(student, queryInfo) {
  const name = normalize(student.name);
  const classText = `${student.class}반`;
  const numberText = `${student.number}번`;
  const combo1 = normalize(`${student.class}반 ${student.number}번`);
  const combo2 = normalize(`${student.class}반 ${student.name}`);
  const combo3 = normalize(`${student.class}반 ${student.number}번 ${student.name}`);
  const chosung = getChosung(student.name);
  const q = queryInfo.q;
  let score = 0;

  if (!q) {
    score += 1;
  }

  if (q === name) score += 1000;
  if (q === chosung) score += 970;
  if (q === combo1 || q === combo2 || q === combo3) score += 980;

  if (name.startsWith(q)) score += 650;
  if (name.includes(q)) score += 520;
  if (chosung.startsWith(q)) score += 600;
  if (chosung.includes(q)) score += 480;

  const syllables = Array.from(student.name);
  if (syllables.some(s => normalize(s) === q)) score += 430;

  if (queryInfo.classNum !== null && student.class === queryInfo.classNum) score += 240;
  if (queryInfo.numberNum !== null && student.number === queryInfo.numberNum) score += queryInfo.classNum !== null ? 420 : 260;

  if (normalize(classText).includes(q)) score += 180;
  if (normalize(numberText).includes(q)) score += 170;
  if (combo1.includes(q) || combo2.includes(q) || combo3.includes(q)) score += 260;

  if (queryInfo.hasNumberWord && queryInfo.numberNum !== null && student.number === queryInfo.numberNum) score += 160;

  return score;
}

function applyFilter() {
  const query = document.getElementById("searchInput").value.trim();
  const classFilter = document.getElementById("classFilter").value;
  const info = parseQuery(query);

  let pool = students.slice();
  if (classFilter !== "all") {
    pool = pool.filter(student => String(student.class) === classFilter);
  }

  filteredStudents = pool
    .map(student => ({ student, score: computeScore(student, info) }))
    .filter(item => !info.q || item.score > 0)
    .sort((a, b) =>
      b.score - a.score ||
      a.student.class - b.student.class ||
      a.student.number - b.student.number ||
      a.student.name.localeCompare(b.student.name, "ko")
    )
    .map(item => item.student);

  renderMeta(filteredStudents, query, classFilter);

  if (!filteredStudents.length) {
    selectedKey = "";
    renderCandidates([]);
    renderDetail(null);
    return;
  }

  const hasCurrent = filteredStudents.some(student => studentKey(student) === selectedKey);
  if (!hasCurrent) {
    selectedKey = studentKey(filteredStudents[0]);
  }

  renderCandidates(filteredStudents);
  const selected = filteredStudents.find(student => studentKey(student) === selectedKey) || filteredStudents[0];
  renderDetail(selected);
}

function renderMeta(results, query, classFilter) {
  document.getElementById("studentCount").textContent = students.length + "명";
  document.getElementById("classCountLabel").textContent = classFilter === "all" ? "전체 반" : `${classFilter}반`;
  document.getElementById("resultCount").textContent = results.length + "명";
  document.getElementById("searchSummary").textContent = "검색어: " + (query || "전체");
  document.getElementById("filterSummary").textContent = "반 필터: " + (classFilter === "all" ? "전체 반" : `${classFilter}반`);
}

function renderCandidates(list) {
  const root = document.getElementById("candidateList");
  if (!list.length) {
    root.innerHTML = `<div class="empty">검색 결과가 없습니다.<br/>이름, 초성, 반/번호를 다시 확인해 주세요.</div>`;
    return;
  }

  root.innerHTML = list.map(student => {
    const key = studentKey(student);
    const active = key === selectedKey ? "active" : "";
    return `
      <div class="candidate ${active}" data-key="${key}">
        <div class="candidate-top">
          <div class="candidate-name">${student.name}</div>
          <div class="candidate-badge">2학년 ${student.class}반 ${student.number}번</div>
        </div>
        
      </div>
    `;
  }).join("");

  root.querySelectorAll(".candidate").forEach(el => {
    el.addEventListener("click", () => {
      selectedKey = el.dataset.key;
      renderCandidates(filteredStudents);
      const student = filteredStudents.find(item => studentKey(item) === selectedKey);
      renderDetail(student || null);
    });
  });
}

function stripSubject(subject) {
  return String(subject || "")
    .replace(/\([^)]*\)/g, "")
    .replace(/_[^\s]+/g, "")
    .replace(/\s+/g, " ")
    .trim();
}

function extractTeacher(detail) {
  const text = String(detail || "").trim();
  const match = text.match(/\(([^()]*)\)\s*$/);
  return match ? match[1].trim() : text;
}

function isSpecialCell(subject, detail) {
  const joined = `${subject} ${detail}`;
  return joined.includes("자율·자치활동") || joined.includes("동아리활동") || joined.includes("진로활동") || String(subject).includes("2학년");
}

function formatCell(cell) {
  const subject = cell?.subject || "";
  const detail = cell?.detail || "";

  if (!subject && !detail) {
    return `<div class="blank">-</div>`;
  }

  if (isSpecialCell(subject, detail)) {
    const top = subject || "-";
    const bottom = detail || "";
    return `
      <div class="subject">${escapeHtml(top)}</div>
      <div class="detail">${escapeHtml(bottom)}</div>
    `;
  }

  const top = stripSubject(subject) || "-";
  const bottom = extractTeacher(detail) || "";
  return `
    <div class="subject">${escapeHtml(top)}</div>
    <div class="detail">${escapeHtml(bottom)}</div>
  `;
}

function escapeHtml(text) {
  return String(text)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function renderDetail(student) {
  const root = document.getElementById("detailPanel");
  const selectedName = document.getElementById("selectedName");

  if (!student) {
    selectedName.textContent = "없음";
    root.innerHTML = `<div class="empty">왼쪽에서 학생을 선택하면 시간표가 표시됩니다.</div>`;
    return;
  }

  selectedName.textContent = student.name;

  const rows = student.timetable.map(row => `
    <tr>
      <td class="period">${escapeHtml(row.period)}</td>
      ${days.map(day => `<td>${formatCell(row[day])}</td>`).join("")}
    </tr>
  `).join("");

  root.innerHTML = `
    <div class="student-head">
      <h3 class="student-title">${escapeHtml(student.name)}</h3>
      <div class="student-sub">
        <span>2학년 ${student.class}반</span>
        <span>${student.number}번</span>
        
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>교시</th>
            <th>월요일</th>
            <th>화요일</th>
            <th>수요일</th>
            <th>목요일</th>
            <th>금요일</th>
          </tr>
        </thead>
        <tbody>
          ${rows}
        </tbody>
      </table>
    </div>
  `;
}

document.getElementById("searchBtn").addEventListener("click", applyFilter);
document.getElementById("classFilter").addEventListener("change", applyFilter);
document.getElementById("searchInput").addEventListener("input", applyFilter);
document.getElementById("searchInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter") applyFilter();
});

applyFilter();
</script>
</body>
</html>
